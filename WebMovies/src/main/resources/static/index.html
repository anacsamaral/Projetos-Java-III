<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema em Casa - Seu Catálogo de Filmes</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
<header>
    <div class="logo">Cinema em Casa 🎬</div>
    <nav>
        <a href="#" class="active">Início</a>
        <a href="#carrossel">Destaques</a>
        <a href="#catalogo">Catálogo</a>
        <a href="/cadastro.html">Cadastrar</a>
        <a href="/pesquisa.html">Pesquisar</a>
    </nav>
</header>

<main>
    <section id="destaque">
        <h2>Filme do Dia</h2>
        <div id="filme-sugerido" class="loading">Carregando sugestão...</div>
    </section>

    <section id="carrossel">
        <h2>Em Alta</h2>
        <div class="carrossel-container">
            <button class="carrossel-btn prev" onclick="rolarCarrossel('left')">←</button>
            <div class="carrossel" id="carrossel-filmes">
                <div class="loading">Carregando filmes...</div>
            </div>
            <button class="carrossel-btn next" onclick="rolarCarrossel('right')">→</button>
        </div>
    </section>

    <section id="catalogo">
        <h2>Todos os Filmes</h2>
        <div class="cards-grid" id="cards-filmes">
            <div class="loading">Carregando catálogo...</div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 CineFlow - Todos os direitos reservados</p>
</footer>

<script>
    async function carregarFilmes() {
        try {
            const resposta = await fetch("http://localhost:8080/apis/list-keyword?keyword=");

            if (resposta.status === 200) {
                const filmes = await resposta.json();
                return filmes;
            } else {
                console.log("Buscando filmes alternativos...");
                return [];
            }
        } catch (erro) {
            console.error("Erro ao carregar filmes:", erro);
            return [];
        }
    }

    function carregarFilmeAleatorio() {
        const filmeSugerido = document.getElementById("filme-sugerido");

        fetch("http://localhost:8080/apis/random-movie")
            .then(resposta => {
                if (!resposta.ok) throw new Error("Erro ao buscar filme");
                return resposta.json();
            })
            .then(filme => {
                filmeSugerido.innerHTML = `🎬 <strong>Assista ainda hoje:</strong> ${filme.title} (${filme.year})`;
            })
            .catch(erro => {
                filmeSugerido.innerHTML = "🍿 Nenhum filme cadastrado ainda. Que tal <a href='/cadastro.html' style='color: #FFD700;'>cadastrar um</a>?";
            });
    }

    function gerarCards(filmes, tipo = 'carrossel') {
        if (!filmes || filmes.length === 0) {
            return `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #aaa;">
                    Nenhum filme encontrado. <a href="/cadastro.html" style="color: #FFD700;">Cadastre o primeiro!</a>
                </div>`;
        }

        let htmlGerado = '';

        for (let filme of filmes) {
            const titulo = filme.title || 'Título não informado';
            const ano = filme.year || 'Ano não informado';
            const genero = filme.category?.nome || 'Gênero não informado';

            let imagemHtml = '';
            if (filme.thumb) {
                imagemHtml = `<img src="/thumbs/${filme.thumb}" alt="${titulo}" loading="lazy">`;
            } else if (filme.poster) {
                imagemHtml = `<img src="/posters/${filme.poster}" alt="${titulo}" loading="lazy">`;
            } else {
                imagemHtml = `<div style="height: 250px; background: #333; display: flex; align-items: center; justify-content: center; color: #666;">
                        🎬<br>Sem imagem
                    </div>`;
            }

            const cartao = tipo === 'carrossel'
                ? `<div class="carrossel-card" onclick="verDetalhes('${titulo}', '${ano}', '${genero}')">
                        ${imagemHtml}
                        <div class="card-info">
                            <h3>${titulo}</h3>
                            <p>${ano}</p>
                        </div>
                       </div>`
                : `<div class="movie-card" onclick="verDetalhes('${titulo}', '${ano}', '${genero}')">
                        ${imagemHtml}
                        <div class="movie-info">
                            <h3>${titulo}</h3>
                            <div class="ano">${ano}</div>
                            <span class="genero">${genero}</span>
                        </div>
                       </div>`;

            htmlGerado += cartao;
        }

        return htmlGerado;
    }

    function verDetalhes(titulo, ano, genero) {
        alert(`🎬 ${titulo}\n📅 ${ano}\n🏷️ ${genero}`);
    }

    function rolarCarrossel(direcao) {
        const carrossel = document.getElementById('carrossel-filmes');
        const quantidadeRolagem = 300;

        if (direcao === 'left') {
            carrossel.scrollLeft -= quantidadeRolagem;
        } else {
            carrossel.scrollLeft += quantidadeRolagem;
        }
    }

    async function carregarTodosFilmes() {
        document.getElementById('carrossel-filmes').innerHTML = '<div class="loading">Carregando...</div>';
        document.getElementById('cards-filmes').innerHTML = '<div class="loading">Carregando...</div>';

        carregarFilmeAleatorio();

        const filmes = await carregarFilmes();

        const carrosselHtml = gerarCards(filmes.slice(0, 10), 'carrossel');
        document.getElementById('carrossel-filmes').innerHTML = carrosselHtml;

        const cardsHtml = gerarCards(filmes, 'grid');
        document.getElementById('cards-filmes').innerHTML = cardsHtml;
    }

    document.addEventListener('DOMContentLoaded', carregarTodosFilmes);
</script>
</body>
</html>
