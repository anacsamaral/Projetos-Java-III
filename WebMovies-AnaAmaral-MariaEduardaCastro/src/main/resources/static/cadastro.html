<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de filme</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="js/cadastrocontroller.js"></script>
</head>
<body>

<header>
    <div class="logo">Cine em Casa 🎬</div>
    <nav>
        <a href="/index.html">Início</a>
        <a href="/cadastro.html" class="active">Cadastrar</a>
        <a href="/pesquisa.html">Pesquisar</a>
    </nav>
</header>

<h1>Cadastro de Filme</h1>

<form enctype="multipart/form-data">
    <p>
        <label for="titulo">Titulo:</label>
        <input type="text" id="titulo" name="titulo"/>
    </p>
    <p>
        <label for="ano">Ano de Lançamento:</label>
        <input type="text" id="ano" name="ano"/>
    </p>
    <p>
        <label for="genero">Genero:</label>
        <select id="genero" name="genero"></select>
    </p>
    <p>
        <label for="poster">Poster:</label>
        <input type="file" id="poster" name="poster"/>
    </p>
</form>

<button onclick="cadastrarFilmePoster()">Cadastrar Filme</button>

<script src="js/filtroscontroller.js"></script>
<script>carregaGenero();</script>
</body>
</html>
