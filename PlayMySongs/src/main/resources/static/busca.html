<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Buscar Músicas - PlayMySongs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/cadastro.css">
    <style>
        /* Um pequeno ajuste extra para a cor do título no card de resultado */
        .text-purple { color: #8924bf; font-weight: bold; }
    </style>
</head>
<body>
<div class="form-container" style="max-width: 600px;">

    <form id="formBusca">
        <h1>Buscar Músicas</h1>
        <div class="mb-3">
            <label for="keyword" class="form-label">O que você quer ouvir?</label>
            <input type="text" id="keyword" class="form-control" placeholder="Digite o nome, artista ou estilo..." required>
        </div>
        <button type="submit" class="btn btn-primary">Pesquisar</button>
    </form>

    <div id="resultadosBusca" class="mt-4"></div>

</div>

<script src="js/busca.js"></script>
</body>
</html>
