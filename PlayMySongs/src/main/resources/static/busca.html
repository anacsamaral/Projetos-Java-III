<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Buscar - PlayMySongs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column align-items-center py-5">

<div class="glass-card p-4 shadow-lg mb-4" style="max-width: 700px; width: 90%;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">Minhas <span class="text-neon">Músicas</span></h2>
        <a href="index.html" class="text-secondary text-decoration-none">← Voltar</a>
    </div>

    <form id="formBusca" class="d-flex gap-2">
        <input type="text" class="form-control bg-dark form-control-lg" id="keyword" placeholder="O que você quer ouvir hoje?" required>
        <button type="submit" class="btn btn-primary px-4">Pesquisar</button>
    </form>
</div>

<div class="container" style="max-width: 900px;">
    <div class="row g-4" id="resultadosBusca">
    </div>
</div>

<script src="js/busca.js"></script>
</body>
</html>
