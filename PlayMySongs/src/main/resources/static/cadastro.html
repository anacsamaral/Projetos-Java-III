<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div class="form-container">
        <form>
            <h1>Cadastrar Músicas</h1>
            <div class="mb-3">
                <label for="tituloMusica" class="form-label">Título da Música</label>
                <input id="tituloMusica" class="form-control" aria-describedby="tituloHelp">
            </div>
            <label for="estiloMusical" class="form-label">Estilo Musical</label>
            <select id="estiloMusical" class="form-select" aria-label="Default select example">
                <option selected>Selecione um estilo:</option>
                <option value="1">MPB</option>
                <option value="2">Rock</option>
                <option value="3">POP</option>
            </select>
            <br>
            <div class="mb-3">
                <label for="artista" class="form-label">Artista:</label>
                <input type="text" class="form-control" id="artista" aria-describedby="artistaHelp">
            </div>
            <div class="mb-3">
                <label for="formFile" class="form-label">Arquivo MP3:</label>
                <input class="form-control" type="file" id="formFile">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>
</html>
