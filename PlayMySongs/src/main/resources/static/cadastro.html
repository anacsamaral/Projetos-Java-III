<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
    <div class="form-container">
        <form id="formCadastro"> <h1>Cadastrar Músicas</h1>
            <div class="mb-3">
                <label for="tituloMusica" class="form-label">Título da Música</label>
                <input type="text" id="tituloMusica" class="form-control" aria-describedby="tituloHelp" required>
            </div>

            <label for="estiloMusical" class="form-label">Estilo Musical</label>
            <select id="estiloMusical" class="form-select" aria-label="Default select example" required>
                <option value="" selected>Carregando estilos...</option> </select>
            <br>

            <div class="mb-3">
                <label for="artista" class="form-label">Artista:</label>
                <input type="text" class="form-control" id="artista" aria-describedby="artistaHelp" required>
            </div>
            <div class="mb-3">
                <label for="formFile" class="form-label">Arquivo MP3 ou OGG:</label>
                <input class="form-control" type="file" id="formFile" accept=".mp3, .ogg" required>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>

            <div id="mensagem" class="mt-3"></div>
        </form>
    </div>
    <script src="js/cadastro.js"></script>
</body>
</html>
