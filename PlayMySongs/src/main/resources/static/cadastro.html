<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Upload - PlayMySongs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="glass-card p-4 shadow-lg" style="max-width: 500px; width: 100%;">
    <h2 class="text-center fw-bold mb-4">Novo <span class="text-neon">Upload</span></h2>

    <form id="formCadastro">
        <div class="mb-3">
            <label for="tituloMusica" class="form-label text-secondary">Título da Música</label>
            <input type="text" class="form-control bg-dark" id="tituloMusica" required>
        </div>
        <div class="mb-3">
            <label for="artista" class="form-label text-secondary">Artista</label>
            <input type="text" class="form-control bg-dark" id="artista" required>
        </div>
        <div class="mb-3">
            <label for="estiloMusical" class="form-label text-secondary">Estilo Musical</label>
            <select class="form-select bg-dark" id="estiloMusical" required>
                <option value="">Carregando estilos...</option>
            </select>
        </div>
        <div class="mb-4">
            <label for="formFile" class="form-label text-secondary">Arquivo MP3/OGG</label>
            <input class="form-control bg-dark" type="file" id="formFile" accept=".mp3, .ogg" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Salvar Música</button>
    </form>

    <div id="mensagem" class="mt-3"></div>

    <div class="text-center mt-4">
        <a href="index.html" class="text-secondary text-decoration-none">← Voltar para a Home</a>
    </div>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
